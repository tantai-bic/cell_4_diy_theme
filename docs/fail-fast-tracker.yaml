      - "[x] P2: Nhúng AppLovin MAX (reward + native) AdService 1 điểm + retry/backoff"
      - "[ ] P2: Murat test crash-free luồng gọi ads (cần thiết bị + Flutter SDK)"
    notes: "Web prototype (index.html) đã validate flow + cơ chế lock/unlock & ads. studio_stack chốt Flutter. P1 hoàn tất: tech-spec port web->Flutter đã PO duyệt (cổng #8). OPEN ISSUE loading wordmark đã chốt: hiển thị tên app 'DIY WALLPAPER' (giữ glitch). Sẵn sàng *QD ở fresh context. KHÔNG web-wrap lên production."

