flutter_native_splash:
  color: "#000000"
  # Pre-Android 12: icon 48dp centered, natural size, không bị scale
  image: assets/splash_logo.png
  android_gravity: center

  web: false
  ios: false

  # Android 12+: chỉ dùng màu đen — 192px icon bị upscale 5× lên 960px → to + mờ
  # Flutter LoadingScreen animation đảm nhận phần logo
  android_12:
    color: "#000000"
    color_dark: "#000000"
    image: assets/splash_logo_12.png

  fullscreen: true
