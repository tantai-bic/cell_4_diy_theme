name: diy_wallpaper
description: DIY Wallpaper — Trạm độ giao diện Cyberpunk/Gamer
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.5

  # Persistence
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Ads (DEV: Google test ads — swap to applovin_max when shipping)
  google_mobile_ads: ^5.3.1

  # Wallpaper
  async_wallpaper: 3.1.0

  # Media
  image_picker: ^1.1.2
  share_plus: 12.0.2

  # App review
  in_app_review: ^2.0.9

  # Network
  connectivity_plus: ^6.0.3

  # Fonts
  google_fonts: ^6.2.1

  # HTTP (Remove BG cloud API)
  dio: ^5.4.3+1

  # Analytics & Crashlytics
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Splash (runtime: FlutterNativeSplash.remove())
  flutter_native_splash: ^2.4.3

  # In-App Purchase
  in_app_purchase: ^3.1.13

  # URL launcher (Settings email/privacy links)
  url_launcher: ^6.2.5

  # File paths (temp dir → FileProvider-accessible on Android)
  path_provider: ^2.1.3

  # Save image to device gallery
  gal: ^2.3.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.11
  flutter_native_splash: ^2.4.3  # CLI: dart run flutter_native_splash:create (runtime dep declared in dependencies)

flutter:
  uses-material-design: true

  assets:
    - assets/theme/manifest.json
    - assets/sticker/manifest.json
    - assets/theme/
    - assets/sticker/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
